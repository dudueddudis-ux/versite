<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Versite — Portfólio de Sites</title>
<style>
  :root{--bg:#0f1115;--card:#171a21;--card2:#1d212b;--txt:#e8eaf0;--mut:#9aa3b2;--acc:#e07a3f;--acc2:#f0a868;--brd:#262b36}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;line-height:1.5}
  header{padding:64px 24px 32px;text-align:center;max-width:900px;margin:0 auto}
  .brand{font-size:14px;letter-spacing:3px;text-transform:uppercase;color:var(--acc2);font-weight:600}
  h1{font-size:clamp(28px,5vw,46px);margin:12px 0 10px;font-weight:700}
  header p{color:var(--mut);font-size:16px;max-width:560px;margin:0 auto}
  main{max-width:1100px;margin:0 auto;padding:24px 24px 80px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
  a.card{display:flex;flex-direction:column;gap:8px;background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:22px;text-decoration:none;color:inherit;transition:transform .15s ease,border-color .15s ease,background .15s ease}
  a.card:hover{transform:translateY(-3px);border-color:var(--acc);background:var(--card2)}
  .card .name{font-size:18px;font-weight:600}
  .card .path{font-size:13px;color:var(--mut);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;word-break:break-all}
  .card .go{margin-top:auto;font-size:13px;color:var(--acc2);font-weight:600}
  .state{text-align:center;color:var(--mut);padding:40px 0;font-size:15px}
  footer{text-align:center;color:var(--mut);font-size:13px;padding:24px}
  footer a{color:var(--acc2);text-decoration:none}
</style>
</head>
<body>
  <header>
    <div class="brand">Versite</div>
    <h1>Nossos sites</h1>
    <p>Cada projeto abaixo é um site no ar. A lista é gerada automaticamente a partir das pastas do projeto.</p>
  </header>
  <main>
    <div id="state" class="state">Carregando sites…</div>
    <div id="grid" class="grid"></div>
  </main>
  <footer>Hospedado no Cloudflare Pages · <a href="https://github.com/dudueddudis-ux/versite">repositório</a></footer>

<script>
  // Pastas que NÃO devem aparecer como sites na home
  var IGNORE = ['.git','.github','assets','node_modules'];

  function titleize(slug){
    return slug.split('-').map(function(w){
      return w ? w.charAt(0).toUpperCase()+w.slice(1) : w;
    }).join(' ');
  }

  var API = 'https://api.github.com/repos/dudueddudis-ux/versite/contents/?ref=main';

  fetch(API, {headers:{'Accept':'application/vnd.github+json'}})
    .then(function(r){ if(!r.ok) throw new Error('GitHub API '+r.status); return r.json(); })
    .then(function(items){
      var dirs = items.filter(function(it){
        return it.type === 'dir' && IGNORE.indexOf(it.name) === -1;
      });
      var grid = document.getElementById('grid');
      var state = document.getElementById('state');
      if(!dirs.length){ state.textContent = 'Nenhum site encontrado ainda.'; return; }
      state.style.display = 'none';
      dirs.sort(function(a,b){ return a.name.localeCompare(b.name); });
      dirs.forEach(function(d){
        var a = document.createElement('a');
        a.className = 'card';
        a.href = '/' + d.name + '/';
        a.innerHTML =
          '<div class="name">' + titleize(d.name) + '</div>' +
          '<div class="path">versite.pages.dev/' + d.name + '</div>' +
          '<div class="go">Abrir site &rarr;</div>';
        grid.appendChild(a);
      });
    })
    .catch(function(err){
      document.getElementById('state').textContent = 'Não foi possível carregar a lista de sites. (' + err.message + ')';
    });
</script>
</body>
</html>
